<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>로그인 - QuickSource.com</title>
    <style>
        body {
            font-family: '맑은 고딕', sans-serif;
            background-color: #f2f4f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box { background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
            width: 350px;
        }
        .logo { color: #3b66f5;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            display: block;
            margin-bottom: 30px;
        }
        .input-field { width: 100%;
            height: 45px;
            margin-bottom: 15px;
            padding-left: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }
        .submit-btn { width: 100%;
            height: 45px;
            background-color: #030712; 
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .links-area { margin-top: 20px;
            font-size: 14px; }
        .links-area a { color: #666666;
            text-decoration: none;
            margin: 0 10px; }
    </style>
</head>
<body>

    <div class="login-box">
        <a href="index.html" class="logo">QuickSource.com</a>
        
        <form action="qs_login.html">
            <input type="text" placeholder="아이디" class="input-field" required>
            <input type="password" placeholder="비밀번호" class="input-field" required>
            <button type="submit" class="submit-btn">로그인</button>
        </form>
        
        <div class="links-area">
            <a href="join.html">회원가입</a>
        </div>
    </div>

</body>
</html>
