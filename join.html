<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>회원가입 - QuickSource.com</title>
    <style>
        body {
            font-family: '맑은 고딕', sans-serif;
            background-color: #f2f4f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .join-box {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
            width: 350px;
        }
        .logo {
            color: #3b66f5;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            display: block;
            margin-bottom: 30px;
        }
        .input-field {
            width: 100%;
            height: 45px;
            margin-bottom: 15px;
            padding-left: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }
        .submit-btn {
            width: 100%;
            height: 45px;
            background-color: #030712;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #666666;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="join-box">
        <a href="index.html" class="logo">QuickSource.com</a>
        
        <form id="joinForm" action="login.html">
            <input type="text" placeholder="아이디" class="input-field" required>
            
            <input type="email" placeholder="abc@gmail.com" class="input-field" required>
            
            <input type="password" id="password" placeholder="비밀번호" class="input-field" required>
            <input type="password" id="passwordCheck" placeholder="비밀번호 확인" class="input-field" required>
            
            <button type="submit" class="submit-btn">회원가입 완료</button>
        </form>
        
        <a href="login.html" class="back-link">이미 계정이 있으신가요? 로그인하기</a>
    </div>

    <script>
        document.getElementById('joinForm').addEventListener('submit', function(event) {
            const password = document.getElementById('password').value;
            const passwordCheck = document.getElementById('passwordCheck').value;
            
            if (password !== passwordCheck) {
                event.preventDefault();
                alert('비밀번호가 일치하지 않습니다.');
            }
        });
    </script>

</body>
</html>
